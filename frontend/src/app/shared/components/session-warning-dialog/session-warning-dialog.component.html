<div class="session-warning-overlay">
  <div class="session-warning-dialog">
    <div class="dialog-header">
      <h2>⚠️ Session Expiring Soon</h2>
    </div>
    
    <div class="dialog-content">
      <p class="warning-message">
        Your session is about to expire due to inactivity.
      </p>
      
      <div class="countdown-container">
        <div class="countdown-label">Time Remaining:</div>
        <div class="countdown-timer">{{ formattedTime }}</div>
      </div>
      
      <p class="action-message">
        Would you like to stay logged in?
      </p>
    </div>
    
    <div class="dialog-actions">
      <button 
        class="btn btn-primary" 
        (click)="onExtendSession()"
        type="button">
        Stay Logged In
      </button>
      <button 
        class="btn btn-secondary" 
        (click)="onLogout()"
        type="button">
        Logout Now
      </button>
    </div>
    
    <div class="dialog-footer">
      <small class="keyboard-hint">
        Press <kbd>Enter</kbd> to stay logged in or <kbd>Esc</kbd> to logout
      </small>
    </div>
  </div>
</div>
