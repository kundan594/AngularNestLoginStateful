<div class="session-warning-overlay" (keydown)="onKeydown($event)" tabindex="0">
  <div class="session-warning-dialog">
    <div class="dialog-header">
      <h2>Session Expiring Soon</h2>
    </div>
    
    <div class="dialog-content">
      <div class="warning-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
      
      <p class="warning-message">
        Your session will expire in:
      </p>
      
      <div class="countdown-timer">
        {{ formattedTime }}
      </div>
      
      <p class="warning-description">
        You will be automatically logged out when the timer reaches zero.
        Click "Stay Logged In" to extend your session.
      </p>
    </div>
    
    <div class="dialog-actions">
      <button 
        type="button" 
        class="btn btn-secondary" 
        (click)="onLogout()"
        aria-label="Logout now">
        Logout Now
      </button>
      <button 
        type="button" 
        class="btn btn-primary" 
        (click)="onExtendSession()"
        aria-label="Stay logged in"
        autofocus>
        Stay Logged In
      </button>
    </div>
    
    <div class="dialog-footer">
      <small class="keyboard-hint">
        Press <kbd>Enter</kbd> to stay logged in or <kbd>Esc</kbd> to logout
      </small>
    </div>
  </div>
</div>
